#     options:
#       globalSearch: ["c.code", "c.email"]
#       layout:
#         table: "{tbody}"                    # solo body, niente thead/filter/tfoot
#         footer: "{pagination}"
#       templates:
#         header: "@App/gridview/custom_header.html.twig"
#     attributes:
#       class: "table table-dark"
#       row:
#         class: "custom-row"

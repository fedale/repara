services:

  database:
    image: postgres:custom
    # command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      POSTGRES_USER: ${POSTGRES_USER:-symfony}
    volumes:
      - db_data:/var/lib/postgresql/data:rw

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  # Real-time hub for the GridView (signal + auto-refresh).
  # App publishes to http://mercure/.well-known/mercure (service name); the
  # browser subscribes same-origin via nginx (proxy on /.well-known/mercure),
  # so no public port and no CORS are needed.
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}

  app:
    environment:
    - APP_NAME=${APP_NAME}
    - APP_ENV=${APP_ENV}
    - APP_LOCALE=${APP_LOCALE}
    - DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE}
    depends_on:
      - database
    volumes:
      - ./app/src:/srv/app/src
      - ./app/config:/srv/app/config
      - ./app/templates:/srv/app/templates
      - ./app/public:/srv/app/public
      # Il bundle ora vive in un repo separato, sibling di repara-demo/ sull'host.
      # Va montato in /srv/gridview-bundle perché composer (dentro il container)
      # risolve il path repo "../gridview-bundle" relativo a /srv/app.
      - ../gridview-bundle:/srv/gridview-bundle
      # Stessa convenzione per il rbac-bundle: composer risolve il path repo
      # "../rbac-bundle" (relativo a /srv/app) in /srv/rbac-bundle.
      - ../rbac-bundle:/srv/rbac-bundle
      # Stessa convenzione per il setting-bundle: composer risolve il path repo
      # "../setting-bundle" (relativo a /srv/app) in /srv/setting-bundle.
      - ../setting-bundle:/srv/setting-bundle

  nginx:
    image: nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    

  # # https://pentacent.medium.com/nginx-and-lets-encrypt-with-docker-in-less-than-5-minutes-b4b8a60d3a71

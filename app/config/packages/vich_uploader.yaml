vich_uploader:
    db_driver: orm
    metadata:
        type: attribute

    mappings:
        asset_attachment:
            uri_prefix: /uploads/asset
            upload_destination: '%kernel.project_dir%/public/uploads/asset'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

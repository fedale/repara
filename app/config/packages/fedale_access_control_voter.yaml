fedale_access_control_voter:
    enabled: false

    # Ruolo che bypassa tutte le regole (allineato alla convenzione dell'app).
    super_admin_role: ROLE_SuperAdmin

    cache:
        enabled: true
        pool: cache.app
        # ttl: 3600  # secondi; default null = nessuna scadenza (invalida il pool a mano)

    # Le regole sono lette dalla tabella permission_rule (entita del bundle).
    provider: doctrine

fedale_gridview:
  # Instant client-side i18n: ship both catalogs to the browser. The app's own
  # switcher (in the navbar) drives the grid, so the bundle's in-grid switcher
  # stays off (lang_switcher: false) — no duplicate switcher.
  i18n:
    locales: [en, it]
    default: en
    client_domain: Gridview
    lang_switcher: false

  defaults:
    options:
      emptyText: "No records found"
      useTurbo: true
      showThead: true
      showTfoot: true
      maxQueryLength: 8000
      # layout:
      #   gridview: "{header} {table} {footer}"
      #   header:   "{globalSearch}"
      #   table:    "{thead} {filter} {tbody} {tfoot}"
      #   footer:   "{pagination}"
    attributes: {}
#     class: "table table-striped"
#     container:
#       class: "table-responsive"

  gridviews:
    # Real-time updates (Mercure): observers of the User grid see other users'
    # create/update/delete reflected on-the-fly (signal + auto-refresh).
    # Enable per grid id (the entity short name lowercased). The User grid is a
    # full CRUD grid (UserController extends AbstractCrudGridController), so its
    # writes publish the signal.
    user:
      options:
        realtime:
          enabled: true

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # myParam: 'My value from services.yaml'
    env(MONGODB_URL): ''
    env(MONGODB_DB): ''
    # Business field loaded by the data fixtures (see App\DataFixtures\Domain).
    env(FIXTURE_DOMAIN): 'idrotermica'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            # DataFixtures extend a dev-only base class (doctrine/doctrine-fixtures-bundle),
            # absent under `composer install --no-dev`. They are registered as services
            # only in dev/test (see when@dev below), so a prod container build doesn't
            # try to compile them.
            - '../src/DataFixtures/'

    # Locale from the gridview `gv_locale` cookie (server first-paint alignment).
    App\EventListener\LocaleSubscriber:
        arguments:
            $enabledLocales: '%kernel.enabled_locales%'
            $defaultLocale: '%kernel.default_locale%'

    # App\Grid\Serializer\ModelNormalizer:
    #     tags: [serializer.normalizer]

    # https://twig.symfony.com/doc/3.x/functions/template_from_string.html
    # Twig\Extension\StringLoaderExtension:

# Data fixtures are a dev/test-only concern: register them (and their domain
# profile wiring) only where doctrine/doctrine-fixtures-bundle is installed.
when@dev: &fixtures
    services:
        _defaults:
            autowire: true
            autoconfigure: true

        # Every domain profile is collected so the provider can pick the active one.
        _instanceof:
            App\DataFixtures\Domain\DomainProfile:
                tags: ['app.fixture_domain_profile']

        App\DataFixtures\:
            resource: '../src/DataFixtures/'

        # Selects the fixture vocabulary for this Repara instance's business field.
        App\DataFixtures\Domain\DomainProfileProvider:
            arguments:
                $profiles: !tagged_iterator app.fixture_domain_profile
                $activeKey: '%env(string:FIXTURE_DOMAIN)%'

        # Fixtures write demo attachment images under the public web root.
        App\DataFixtures\Asset\AssetAttachmentFixtures:
            arguments:
                $publicDir: '%kernel.project_dir%/public'

when@test: *fixtures

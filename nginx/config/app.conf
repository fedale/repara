location / {
        # try to serve file directly, fallback to index.php
        try_files $uri /index.php$is_args$args;
}

# Mercure hub, served same-origin so the mercureAuthorization cookie is valid.
# Proxies to the "mercure" docker service. SSE needs buffering off + long timeout.
location /.well-known/mercure {
    # Defer DNS to request time (docker embedded resolver) so nginx starts even
    # if the hub isn't up yet, and re-resolves if its IP changes.
    resolver 127.0.0.11 valid=10s;
    set $mercure_upstream http://mercure;
    # With a variable in proxy_pass the original URI is not forwarded
    # automatically, so append it explicitly (path + query string).
    proxy_pass $mercure_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
}

# PROD
location ~ ^/index\.php(/|$) {
    root /srv/app/public;
    fastcgi_pass app:9000;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    # When you are using symlinks to link the document root to the
    # current version of your application, you should pass the real
    # application path instead of the path to the symlink to PHP
    # FPM.
    # Otherwise, PHP's OPcache may not properly detect changes to
    # your PHP files (see https://github.com/zendtech/ZendOptimizerPlus/issues/126
    # for more information).
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    # Prevents URIs that include the front controller. This will 404:
    # http://domain.tld/index.php/some-path
    # Remove the internal directive to allow URIs like this
    internal;
}

# return 404 for all other php files not matching the front controller
# this prevents access to other php files you don't want to be accessible.
location ~ \.php$ {
    return 404;
}

location /_wdt {
   try_files $uri /index.php$is_args$args;
}

location /build {
    root /srv/app/public;
    try_files $uri /index.php$is_args$args;
}

location /bundles/easyadmin {
    root /srv/app/public;
    try_files $uri /index.php$is_args$args;
}